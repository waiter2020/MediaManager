spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:mediamanager}
    username: ${POSTGRES_USER:mediamanager}
    password: ${POSTGRES_PASSWORD:mediamanager}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mediamanager:
  auth:
    enabled: true
    jwt:
      secret: test-jwt-secret-key-must-be-at-least-32-chars-long
      access-token-expiration: 3600000
      refresh-token-expiration: 86400000
  ai:
    default-provider: noop
    llm-provider: noop
    embed-provider: noop
  library:
    scan:
      enabled: false

logging:
  level:
    root: WARN
    com.mediamanager: INFO
