services:
  mediamanager:
    build:
      context: .
      args:
        # Default profile uses China-friendly mirrors; override in .env if needed.
        MIRROR_PROFILE: ${MIRROR_PROFILE:-cn}
        MAVEN_SETTINGS_FILE: ${MAVEN_SETTINGS_FILE:-settings.xml}
        DOCKER_HUB_MIRROR: ${DOCKER_HUB_MIRROR:-docker.m.daocloud.io}
        NODE_IMAGE: ${NODE_IMAGE:-docker.m.daocloud.io/library/node:20-alpine}
        MAVEN_IMAGE: ${MAVEN_IMAGE:-docker.m.daocloud.io/library/maven:3.9-eclipse-temurin-21}
        JRE_IMAGE: ${JRE_IMAGE:-docker.m.daocloud.io/library/eclipse-temurin:21-jre-alpine}
        ALPINE_MIRROR_HOST: ${ALPINE_MIRROR_HOST:-mirrors.tuna.tsinghua.edu.cn}
        DEBIAN_MIRROR_HOST: ${DEBIAN_MIRROR_HOST:-mirrors.aliyun.com}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
    container_name: mediamanager
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
    environment:
      - JAVA_OPTS=${JAVA_OPTS:--Xmx1024m -Xms256m}
      - MEDIAMANAGER_AUTH_JWT_SECRET=${JWT_SECRET:-change-me-in-production-256-bit-key}
      - MEDIAMANAGER_FFMPEG_PATH=/usr/bin/ffmpeg
      - MEDIAMANAGER_FFPROBE_PATH=/usr/bin/ffprobe
      - MEDIAMANAGER_AI_OLLAMA_BASE_URL=${MEDIAMANAGER_AI_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      # Map host absolute paths (e.g. E:\Movies) stored in DB to container mount.
      # Semicolon-separated: E:\Movies=/home/media;F:\TV=/media/tv
      - MEDIAMANAGER_STORAGE_PATH_MAPPINGS=${MEDIAMANAGER_STORAGE_PATH_MAPPINGS:-}
      - MEDIAMANAGER_STORAGE_PATH_MAP_FROM=${HOST_MEDIA_PATH:-./media}
      - MEDIAMANAGER_STORAGE_PATH_MAP_TO=${MEDIAMANAGER_STORAGE_PATH_MAP_TO:-/home/media}
    volumes:
      - ./data:/app/data
      # Primary library mount — create libraries with path /home/media (not host E:\...).
      - ${HOST_MEDIA_PATH:-./media}:/home/media:ro
      # Legacy alias: DB rows may still reference an old container prefix (e.g. /home/test_media).
      # Mounts the same host folder so old file_path values remain valid until scan rewrites them.
      - ${HOST_MEDIA_PATH:-./media}:${LEGACY_LIBRARY_MOUNT:-/home/test_media}:ro
    networks:
      - mm-net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/api/v1/system/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  mm-net:
    driver: bridge
