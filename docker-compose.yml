services:
  mediamanager:
    build:
      context: .
      args:
        # 国内默认：DaoCloud 基础镜像 + 阿里云 apk/apt + npmmirror + 阿里云 Maven
        # 海外：复制 .env.example 中「海外示例」几行到 .env
        MIRROR_PROFILE: ${MIRROR_PROFILE:-cn}
        MAVEN_SETTINGS_FILE: ${MAVEN_SETTINGS_FILE:-settings.xml}
        DOCKER_HUB_MIRROR: ${DOCKER_HUB_MIRROR:-docker.m.daocloud.io}
        NODE_IMAGE: ${NODE_IMAGE:-docker.m.daocloud.io/library/node:20-alpine}
        MAVEN_IMAGE: ${MAVEN_IMAGE:-docker.m.daocloud.io/library/maven:3.9-eclipse-temurin-21}
        JRE_IMAGE: ${JRE_IMAGE:-docker.m.daocloud.io/library/eclipse-temurin:21-jre-alpine}
        ALPINE_MIRROR_HOST: ${ALPINE_MIRROR_HOST:-mirrors.aliyun.com}
        DEBIAN_MIRROR_HOST: ${DEBIAN_MIRROR_HOST:-mirrors.aliyun.com}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    container_name: mediamanager
    ports:
      - "80:80"
    environment:
      - MEDIAMANAGER_AUTH_JWT_SECRET=${JWT_SECRET:-change-me-in-production-256-bit-key}
      - MEDIAMANAGER_FFMPEG_PATH=/usr/bin/ffmpeg
      - MEDIAMANAGER_FFPROBE_PATH=/usr/bin/ffprobe
      # Map persisted host paths to container mount (fixes 40404 for old DB entries)
      - MEDIAMANAGER_STORAGE_PATH_MAP_FROM=${HOST_MEDIA_PATH:-}
      - MEDIAMANAGER_STORAGE_PATH_MAP_TO=/home/media
    volumes:
      - ./media:/media:ro # Optional: mount local media folder read-only
      - ./data:/app/data  # Mount data for SQLite and cache storage
      - E:\2024软考系统架构设计师VIP套餐视频:/home/test_media:ro
      # Optional: override via HOST_MEDIA_PATH (Windows example: E:\Movies)
      - ${HOST_MEDIA_PATH:-./media}:/home/media:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/api/v1/system/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
