services:
  mediamanager:
    build:
      context: .
      args:
        # 国内默认：DaoCloud 基础镜像 + 清华 apk + 阿里云 Maven；npm 见 NPM_REGISTRY
        # 海外：复制 .env.example 中「海外示例」几行到 .env
        MIRROR_PROFILE: ${MIRROR_PROFILE:-cn}
        MAVEN_SETTINGS_FILE: ${MAVEN_SETTINGS_FILE:-settings.xml}
        DOCKER_HUB_MIRROR: ${DOCKER_HUB_MIRROR:-docker.m.daocloud.io}
        NODE_IMAGE: ${NODE_IMAGE:-docker.m.daocloud.io/library/node:20-alpine}
        MAVEN_IMAGE: ${MAVEN_IMAGE:-docker.m.daocloud.io/library/maven:3.9-eclipse-temurin-21}
        JRE_IMAGE: ${JRE_IMAGE:-docker.m.daocloud.io/library/eclipse-temurin:21-jre-alpine}
        ALPINE_MIRROR_HOST: ${ALPINE_MIRROR_HOST:-mirrors.tuna.tsinghua.edu.cn}
        DEBIAN_MIRROR_HOST: ${DEBIAN_MIRROR_HOST:-mirrors.aliyun.com}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
    container_name: mediamanager
    extra_hosts:
      # Linux: map host gateway; Windows/macOS Docker Desktop also resolve this name
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
      # Extra stream listeners — spread preview traffic across HTTP/1.1 connection pools
      - "50000-50002:50000-50002"
    environment:
      - MEDIAMANAGER_STREAM_AUX_PORTS=${MEDIAMANAGER_STREAM_AUX_PORTS:-50000,50001,50002}
      - MEDIAMANAGER_AUTH_JWT_SECRET=${JWT_SECRET:-change-me-in-production-256-bit-key}
      - MEDIAMANAGER_FFMPEG_PATH=/usr/bin/ffmpeg
      - MEDIAMANAGER_FFPROBE_PATH=/usr/bin/ffprobe
      # Ollama on host (semantic search / AI); override in .env or sys_config
      - MEDIAMANAGER_AI_OLLAMA_BASE_URL=${MEDIAMANAGER_AI_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      # Embedded PostgreSQL (runs inside this container)
      - POSTGRES_HOST=127.0.0.1
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-mediamanager}
      - POSTGRES_USER=${POSTGRES_USER:-mediamanager}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-mediamanager}
      - PGDATA=/app/data/postgres
      # Map persisted host paths to the container mount.
      # If playback returns 40404, set HOST_MEDIA_PATH to the host path stored in the DB,
      # or override MEDIAMANAGER_STORAGE_PATH_MAP_FROM explicitly.
      - MEDIAMANAGER_STORAGE_PATH_MAP_FROM=${MEDIAMANAGER_STORAGE_PATH_MAP_FROM:-${HOST_MEDIA_PATH:-./media}}
      - MEDIAMANAGER_STORAGE_PATH_MAP_TO=${MEDIAMANAGER_STORAGE_PATH_MAP_TO:-/home/media}
    volumes:
      - ./media:/media:ro # Optional: mount local media folder read-only
      - ./data:/app/data  # PostgreSQL data + cache (thumbnails / HLS segments)
      - ${HOST_MEDIA_PATH:-./media}:/home/media:ro
    # --- GPU hardware acceleration (optional; uncomment ONE block, then rebuild image) ---
    #
    # Intel/AMD VA-API or QSV (Linux host; requires intel-media-driver in image):
    #   1. docker compose build mediamanager
    #   2. Uncomment the environment/devices/group_add lines below
    #   3. If permission denied, replace render with host GID: getent group render
    # environment:
    #   - MEDIAMANAGER_PLAYBACK_HARDWARE_ACCELERATION=auto
    #   - MEDIAMANAGER_PLAYBACK_HARDWARE_DEVICE=/dev/dri/renderD128
    # devices:
    #   - /dev/dri:/dev/dri
    # group_add:
    #   - video
    #   - render
    #
    # NVIDIA NVENC:
    # environment:
    #   - MEDIAMANAGER_PLAYBACK_HARDWARE_ACCELERATION=nvenc
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu, video]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/api/v1/system/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
